name: CI
on:
  push:
    branches: main
    paths:
      - '.github/workflows/main.yml'
      - 'action.yml'
      - 'src/**/*.ts'
      - 'package.json'
      - 'yarn.lock'

  pull_request:
    paths:
      - '.github/workflows/main.yml'
      - 'action.yml'
      - 'src/**/*.ts'
      - 'package.json'
      - 'yarn.lock'

  workflow_dispatch:

jobs:
  ci-test:
    name: Build Kernel
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

    - name: Build Kernel
      uses: ./
      with:
          kernel-url: https://github.com/galaxygamespvpinfinito-sketch/android_kernel_samsung_s5e8535
          kernel-dir: s5e8535
          kernel-branch: main
          config: a17x_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: true
          ksu-version: main
          android-version: 12
          aosp-clang-version: r383902
          disable-lto: true
          anykernel3: true
